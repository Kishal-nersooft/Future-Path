<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Manage your Future Path profile information.">
    <title>Profile | Future Path</title>

    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://unpkg.com">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9Oer+R0CEaRZ9SAzqREqN7E1MxLvmPpT2cyVnf0O8sDG"
      crossorigin="anonymous"
    >
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="page-noise" aria-hidden="true"></div>
    <div class="cursor-glow" aria-hidden="true"></div>

    <nav class="navbar navbar-expand-lg fixed-top fp-navbar" aria-label="Primary navigation">
      <div class="container">
        <a class="navbar-brand brand-mark" href="index.html#home" aria-label="Future Path home">
          <img
            class="brand-logo"
            src="https://myfuturepath.us/web/image/website/1/logo/My%20Website?unique=0751440"
            alt="Future Path"
          >
        </a>

        <button
          class="navbar-toggler border-0"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNavbar"
          aria-controls="mainNavbar"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="hamburger-lines">
            <span></span>
            <span></span>
            <span></span>
          </span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
            <li class="nav-item"><a class="nav-link" href="index.html#home">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="index.html#partners">Partners</a></li>
            <li class="nav-item"><a class="nav-link" href="resources.html">Resources</a></li>
            <li class="nav-item"><a class="nav-link" href="universities.html">Universities</a></li>
            <li class="nav-item"><a class="nav-link" href="https://myfuturepath.us/web/login">Colleges</a></li>
          </ul>
          <div class="nav-actions ms-lg-4">
            <a class="btn btn-primary-gradient" href="registration.html">Register</a>
            <a class="btn btn-glass" href="https://myfuturepath.us/web/login">Sign In</a>
          </div>
        </div>
      </div>
    </nav>

    <main class="profile-page" data-profile-page>
      <section class="profile-shell section-shell">
        <div class="container">
          <div class="profile-header" data-aos="fade-up">
            <div>
              <span class="eyebrow">
                <i class="bi bi-person-workspace"></i>
                <span id="profileRoleEyebrow">Profile workspace</span>
              </span>
              <h1 id="profileRoleTitle" class="display-heading">Profile</h1>
              <p id="profileRoleSummary" class="hero-subtitle">
                Select a profile menu item to manage the matching content.
              </p>
            </div>
            <span id="profileRoleBadge" class="profile-role-badge">Profile</span>
          </div>

          <div class="profile-layout" data-aos="fade-up" data-aos-delay="100">
            <aside class="profile-sidebar" aria-label="Profile navigation">
              <div class="profile-sidebar-card">
                <div class="profile-sidebar-user">
                  <span><i class="bi bi-person-fill"></i></span>
                  <div>
                    <strong>kish</strong>
                    <small>Future Path profile</small>
                  </div>
                </div>
                <div id="profileSidebarNav" class="profile-sidebar-nav" role="list"></div>
              </div>
            </aside>

            <section id="profileContentPanel" class="profile-content-card" aria-live="polite"></section>
          </div>
        </div>
      </section>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="script.js"></script>
  </body>
</html>
