<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Register as a Future Path agent or partner to help students access U.S. college opportunities.">
    <title>Agent Registration | Future Path</title>

    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://unpkg.com">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9Oer+R0CEaRZ9SAzqREqN7E1MxLvmPpT2cyVnf0O8sDG"
      crossorigin="anonymous"
    >
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="page-noise" aria-hidden="true"></div>
    <div class="cursor-glow" aria-hidden="true"></div>

    <nav class="navbar navbar-expand-lg fixed-top fp-navbar" aria-label="Primary navigation">
      <div class="container">
        <a class="navbar-brand brand-mark" href="index.html#home" aria-label="Future Path home">
          <img
            class="brand-logo"
            src="https://myfuturepath.us/web/image/website/1/logo/My%20Website?unique=0751440"
            alt="Future Path"
          >
        </a>

        <button
          class="navbar-toggler border-0"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNavbar"
          aria-controls="mainNavbar"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="hamburger-lines">
            <span></span>
            <span></span>
            <span></span>
          </span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
            <li class="nav-item"><a class="nav-link" href="index.html#home">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="index.html#partners">Partners</a></li>
            <li class="nav-item"><a class="nav-link" href="resources.html">Resources</a></li>
            <li class="nav-item"><a class="nav-link" href="universities.html">Universities</a></li>
            <li class="nav-item"><a class="nav-link" href="https://myfuturepath.us/web/login">Colleges</a></li>
          </ul>
          <div class="nav-actions ms-lg-4">
            <a class="btn btn-primary-gradient" href="registration.html">Register</a>
            <a class="btn btn-glass" href="https://myfuturepath.us/web/login">Sign In</a>
          </div>
        </div>
      </div>
    </nav>

    <main class="registration-page">
      <section class="registration-hero section-shell overflow-hidden">
        <div class="hero-bg" aria-hidden="true">
          <span class="hero-orb hero-orb-one"></span>
          <span class="hero-orb hero-orb-two"></span>
          <span class="particle-field"></span>
        </div>

        <div class="container position-relative">
          <div class="registration-form-card glass-panel" data-aos="fade-up" data-aos-delay="120">
            <div class="profile-section-heading">
              <span>Agent information</span>
              <p>Use this form for agent registration. Required fields are marked with an asterisk.</p>
            </div>

            <form class="profile-form agent-registration-form" data-agent-registration-form>
              <div class="profile-form-grid">
                <label>
                  <span>First name <sup>*</sup></span>
                  <input type="text" name="first_name" autocomplete="given-name" required>
                </label>
                <label>
                  <span>Last name <sup>*</sup></span>
                  <input type="text" name="last_name" autocomplete="family-name" required>
                </label>
                <label>
                  <span>Company/Organization</span>
                  <input type="text" name="company" autocomplete="organization">
                </label>
                <label>
                  <span>Country</span>
                  <select name="country" autocomplete="country-name">
                    <option selected>Afghanistan</option>
                    <option>Australia</option>
                    <option>Canada</option>
                    <option>India</option>
                    <option>Sri Lanka</option>
                    <option>United Kingdom</option>
                    <option>United States</option>
                    <option>Other</option>
                  </select>
                </label>
                <label>
                  <span>Email address <sup>*</sup></span>
                  <input type="email" name="email" autocomplete="email" required>
                </label>
                <label>
                  <span>Phone number</span>
                  <input type="tel" name="phone" autocomplete="tel">
                </label>
                <label class="profile-form-wide">
                  <span>How did you hear about Future Path <sup>*</sup></span>
                  <select name="referral_source" required>
                    <option value="" selected disabled>Select one</option>
                    <option>Student or family referral</option>
                    <option>School or organization</option>
                    <option>Social media</option>
                    <option>Search engine</option>
                    <option>Future Path event</option>
                    <option>Other</option>
                  </select>
                </label>
              </div>

              <div class="profile-form-actions">
                <button class="btn btn-primary-gradient" type="submit">
                  Submit Registration
                  <i class="bi bi-arrow-right"></i>
                </button>
              </div>
              <p class="registration-form-status" data-agent-registration-status hidden>
                Thanks. We received your agent registration details.
              </p>
            </form>
          </div>
        </div>
      </section>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="script.js"></script>
  </body>
</html>
